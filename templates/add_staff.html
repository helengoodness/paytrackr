{% extends "base.html" %}

{% block content %}

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="container mt-4">
  <h3 class="text-center">Add New Staff</h3>
  <form method="POST" class="mt-4">
    
    <div class="mb-3">
      <label for="full_name">Full Name</label>
      <input type="text" id="full_name" name="full_name" class="form-control" required autocomplete="name">
    </div>
    
    <div class="mb-3">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" required autocomplete="email">
    </div>
    
    <div class="mb-3">
      <label for="gender">Gender</label>
      <select name="gender" id="gender" class="form-control" autocomplete="sex">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>
    
    <div class="mb-3">
      <label for="department">Department</label>
      <input type="text" id="department" name="department" class="form-control" autocomplete="organization">
    </div>
    
    <div class="mb-3">
      <label for="position">Position</label>
      <select name="position" id="position" class="form-control" autocomplete="organization-title">
        {% for position in positions %}
          <option value="{{ position[0] }}">{{ position[1] }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="mb-3">
      <label for="date_employed">Date Employed</label>
      <input type="date" id="date_employed" name="date_employed" class="form-control" autocomplete="bday">
    </div>
    
    <button type="submit" class="btn btn-primary">Save Staff</button>
  </form>
</div>

{% endblock %}
