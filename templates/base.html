<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PayTrackr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --main-pink: #ff69b4;
      --main-purple: #8e44ad;
      --main-orange: #ffa500;
    }

    .navbar-custom {
      background: linear-gradient(90deg, var(--main-pink), var(--main-purple), var(--main-orange));
    }

    .header-bg {
      background: linear-gradient(to right, var(--main-pink), var(--main-orange));
    }

    .footer-bg {
      background-color: var(--main-purple);
    }

    .nav-link {
      color: white !important;
    }

    .nav-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header-bg text-white text-center py-4">
    <div class="container">
      <h1>Welcome to PayTrackr</h1>
      <p class="lead">Manage your staff and payroll efficiently</p>
    </div>
  </header>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="/">PayTrackr</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon bg-light"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/add_staff">Add Staff</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/staff_list">Staff List</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/payroll">Payroll</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="container my-5">
    {% block content %}
    {% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer-bg text-white text-center py-3">
    <div class="container">
      <small>&copy; 2025 PayTrackr. All rights reserved.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
